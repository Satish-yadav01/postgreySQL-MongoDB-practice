# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55000/myapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# MongoDB Configuration for Audit Logs
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://admin:admin123@localhost:27017/audit_db?authSource=admin}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:audit_db}

# Server Configuration
server.port=8080
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.satish.practicepostgreysql=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG